version: "3.9"

services:
  app:
    image: node:26-alpine
    container_name: rafc-app
    working_dir: /usr/src/app
    command: sh -c "npm install && node index.js"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      CONNECTION_STRING: mongodb://mongo:27017/rafc
      JWT_SECRET: change-me-before-production
    volumes:
      - ./backend/src:/usr/src/app
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: rafc-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  nginx:
    image: nginx:1.27-alpine
    container_name: rafc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./test.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mongo-data:
