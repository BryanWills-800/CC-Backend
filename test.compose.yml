version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: test.Dockerfile
    container_name: rafc-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      CONNECTION_STRING: mongodb://mongo:27017/rafc
      JWT_SECRET: change-me-before-production
    expose:
      - "3000"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: rafc-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  nginx:
    image: nginx:1.27-alpine
    container_name: rafc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./test.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mongo-data:
