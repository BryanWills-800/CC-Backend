services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: rafc-postgres:local
    container_name: rafc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-rafc}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - rafc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rafc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: rafc-backend:local
    container_name: rafc-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4001}
      JWT_SECRET: ${JWT_SECRET:-local_jwt_secret}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-local_postgres_password}@postgres:5432/${POSTGRES_DB:-rafc}?schema=public
    ports:
      - "${PORT:-4001}:${PORT:-4001}"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: rafc-nginx:local
    container_name: rafc-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${NGINX_PORT:-8080}:80"


volumes:
  rafc_pgdata:


